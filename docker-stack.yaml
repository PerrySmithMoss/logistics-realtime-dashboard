version: "3.9"

services:
  fleet-api:
    image: ghcr.io/perrysmithmoss/logistics-realtime-dashboard:${GIT_COMMIT_HASH:-latest}
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=5570
      - MIN_LOG_LEVEL=INFO
      - CORS_ALLOWED_ORIGINS=https://fleet-dashboard-pied.vercel.app,https://fleet-dashboard-jedxcjyxa-perrysmithmoss-projects.vercel.app/
      - INTERNAL_AUTH_SECRET=/run/secrets/fleet_internal_auth_secret
      - FLEET_STREAM_SIGNING_SECRET=/run/secrets/fleet_stream_signing_secret
      - OPEN_ROUTE_SERVICE_API_KEY=/run/secrets/fleet_open_route_service_api_key
    secrets:
      - fleet_internal_auth_secret
      - fleet_stream_signing_secret
      - fleet_open_route_service_api_key
    networks:
      - portfolio_network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.fleet-api.loadbalancer.server.port=5570"
        - "traefik.http.routers.fleet-api.rule=Host(`fleet-api.perrysmithmoss.com`)"
        - "traefik.http.routers.fleet-api.entrypoints=websecure"
        - "traefik.http.routers.fleet-api.tls.certresolver=myresolver"
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

networks:
  portfolio_network:
    external: true

secrets:
  fleet_internal_auth_secret:
    external: true
  fleet_stream_signing_secret:
    external: true
  fleet_open_route_service_api_key:
    external: true
